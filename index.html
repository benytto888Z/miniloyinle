<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BuzzWire Arcade</title>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --p1: #00e5ff; --p2: #ff0055; --txt: #fff; --gold: #ffca28; --stat: #ff4444; }
        body.light-theme { --bg: #eee; --card: #fff; --txt: #000; --stat: #ff4444; }
        
        html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--txt); transition: 0.4s; }
        body { display: flex; align-items: center; justify-content: center; }

        /* STATUS BAR */
        #top-bar { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .status-pill { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; background: rgba(128,128,128,0.1); padding: 5px 15px; border-radius: 20px; }
        .bullet { width: 10px; height: 10px; border-radius: 50%; background: var(--stat); box-shadow: 0 0 10px var(--stat); }
        .online { --stat: #00ff00 !important; }

        .last-result { font-size: 0.9rem; color: var(--gold); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .dash { width: 98vw; height: 90vh; display: grid; grid-template-columns: 1fr 260px 1fr; gap: 15px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; position: relative; border: 2px solid rgba(128,128,128,0.1); }
        #p1-card { border-bottom: 12px solid var(--p1); }
        #p2-card { border-bottom: 12px solid var(--p2); }

        .win-count { font-size: 8rem; font-weight: 900; opacity: 0.15; position: absolute; top: 20px; }
        .player-label { font-size: 1.5rem; letter-spacing: 4px; color: #666; font-weight: 900; }
        
        .ring-container { position: relative; width: 240px; height: 240px; }
        svg { transform: rotate(-90deg); width: 240px; height: 240px; }
        circle { fill: none; stroke-width: 15; stroke-linecap: round; }
        .track { stroke: rgba(128,128,128,0.1); }
        .progress { stroke: var(--gold); transition: 1s linear; filter: drop-shadow(0 0 10px var(--gold)); }
        #countdown-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; font-family: monospace; }

        .dot { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; border: 3px solid rgba(0,0,0,0.2); transition: 0.2s; }
        .p1-s { background: var(--p1); box-shadow: 0 0 30px var(--p1); }
        .p2-s { background: var(--p2); box-shadow: 0 0 30px var(--p2); }

        #final-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 50px; border-radius: 40px; font-size: 5rem; font-weight: 900; text-align: center; display: none; z-index: 1000; border: 20px solid var(--gold); }
        
        button { background: var(--card); color: var(--txt); border: 1px solid #444; padding: 8px 15px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body class="dark-theme">
    <div id="top-bar">
        <div class="status-pill"><div id="bullet" class="bullet"></div><span id="stat-text">DISCONNECTED</span></div>
        <div class="last-result" id="history">LAST MATCH: NO DATA</div>
        <button onclick="document.body.classList.toggle('light-theme')">🌓 THEME</button>
    </div>

    <div class="dash">
        <div class="card" id="p1-card"><div class="win-count" id="p1-wins">0</div><div class="player-label">PLAYER 1</div><div style="display:flex;gap:15px;"><div class="dot" id="p1-1"></div><div class="dot" id="p1-2"></div><div class="dot" id="p1-3"></div></div></div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div class="ring-container"><svg><circle class="track" cx="120" cy="120" r="105"></circle><circle id="progress-bar" class="progress" cx="120" cy="120" r="105" stroke-dasharray="659.7" stroke-dashoffset="0"></circle></svg><div id="countdown-text">05:00</div></div>
            <p id="match-status" style="margin-top:20px; font-weight:bold; letter-spacing:2px; color:#888;">TOUCH PAD TO START</p>
        </div>
        <div class="card" id="p2-card"><div class="win-count" id="p2-wins">0</div><div class="player-label">PLAYER 2</div><div style="display:flex;gap:15px;"><div class="dot" id="p2-1"></div><div class="dot" id="p2-2"></div><div class="dot" id="p2-3"></div></div></div>
    </div>

    <div id="final-popup"><div id="winner-text"></div><div style="font-size:1.5rem;color:#666;margin-top:20px;">REBOOTING IN <span id="reboot-timer">40</span>s</div></div>

    <script>
        let ws;
        const circle = document.getElementById('progress-bar');
        const circumference = 659.7;
        
        // Load history from browser storage
        document.getElementById('history').innerText = "LAST MATCH: " + (localStorage.getItem('lastWin') || "NONE");

        function connect() {
            ws = new WebSocket('ws://' + window.location.hostname + ':81/');
            ws.onopen = () => { document.getElementById('bullet').classList.add('online'); document.getElementById('stat-text').innerText="SYSTEM LIVE"; };
            ws.onclose = () => { document.getElementById('bullet').classList.remove('online'); document.getElementById('stat-text').innerText="OFFLINE"; setTimeout(connect, 2000); };
            ws.onmessage = (e) => {
                let d = JSON.parse(e.data);
                if(d.match_active) {
                    let rem = Math.max(0, Math.floor((300000 - d.match_elapsed) / 1000));
                    circle.style.strokeDashoffset = circumference - (rem / 300) * circumference;
                    document.getElementById('countdown-text').innerText = `${Math.floor(rem/60).toString().padStart(2,'0')}:${(rem%60).toString().padStart(2,'0')}`;
                }
                document.getElementById('p1-wins').innerText = d.p1_match_wins;
                document.getElementById('p2-wins').innerText = d.p2_match_wins;
                document.getElementById('match-status').innerText = d.status;
                for(let i=1;i<=3;i++) {
                    document.getElementById('p1-'+i).className = d.p1_strikes >= i ? 'dot p1-s' : 'dot';
                    document.getElementById('p2-'+i).className = d.p2_strikes >= i ? 'dot p2-s' : 'dot';
                }
                if (d.status == "MATCH_OVER") {
                    let winMsg = d.winner == "DRAW" ? "NO WINNER" : d.winner.replace('_',' ') + " WINS!";
                    localStorage.setItem('lastWin', winMsg);
                    document.getElementById('winner-text').innerText = winMsg;
                    document.getElementById('final-popup').style.display = "block";
                    startRebootTimer();
                }
            };
        }
        function startRebootTimer() {
            let timeLeft = 40;
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--; document.getElementById('reboot-timer').innerText = timeLeft;
                    if(timeLeft == 5) ws.send("REBOOT");
                    if(timeLeft == 0) location.reload();
                }
            }, 1000);
        }
        window.onload = connect;
    </script>
</body>
</html>
